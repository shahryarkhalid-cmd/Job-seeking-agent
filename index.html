<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobBot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #eee;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(120, 0, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(0, 255, 150, 0.03) 0%, transparent 50%);
            animation: bgMove 15s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgMove {
            0%   { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(30px, 20px) rotate(3deg); }
        }

        /* ── THREAD SCREEN ── */
        #thread-screen {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 80px rgba(0, 212, 255, 0.08), 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3.5rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-8px); }
        }

        #thread-screen h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7800ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        #thread-screen p {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        #thread-input {
            padding: 14px 24px;
            border-radius: 50px;
            border: 1.5px solid rgba(0, 212, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            width: 320px;
            outline: none;
            text-align: center;
            transition: all 0.3s;
        }

        #thread-input:focus {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }

        #thread-input::placeholder { color: #555; }

        #start-btn {
            display: block;
            margin: 20px auto 0;
            padding: 14px 50px;
            background: linear-gradient(135deg, #00d4ff, #7800ff);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.4);
        }

        /* ── CHAT SCREEN ── */
        #chat-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 820px;
            height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        #chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo { font-size: 1.8rem; }

        #chat-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff, #7800ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(1.3); }
        }

        #thread-label {
            color: #555;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ── MESSAGES ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .message {
            max-width: 72%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 0.92rem;
            white-space: pre-wrap;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user {
            background: linear-gradient(135deg, #00d4ff, #0099bb);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
        }

        .bot {
            background: rgba(255, 255, 255, 0.04);
            color: #ddd;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .bot a {
            color: #00d4ff;
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            transition: border-color 0.2s;
        }

        .bot a:hover { border-color: #00d4ff; }

        .typing {
            color: #555;
            font-style: italic;
            font-size: 0.85rem;
        }

        /* ── INPUT AREA ── */
        #input-area {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            margin-top: 5px;
        }

        #user-input {
            flex: 1;
            padding: 14px 22px;
            border-radius: 50px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        #user-input:focus {
            border-color: rgba(0, 212, 255, 0.4);
            background: rgba(0, 212, 255, 0.03);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.08);
        }

        #user-input::placeholder { color: #444; }

        #send-btn {
            padding: 14px 26px;
            background: linear-gradient(135deg, #00d4ff, #7800ff);
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
            font-size: 0.95rem;
        }

        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.35);
        }

        #send-btn:disabled {
            background: #222;
            color: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- THREAD SCREEN -->
    <div id="thread-screen">
        <div class="logo">💼</div>
        <h1>JobBot</h1>
        <p>Your AI-powered job search assistant</p>
        <input id="thread-input" type="text" placeholder="Enter your name or ID" />
        <button id="start-btn" onclick="startChat()">Start Chatting →</button>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen">
        <div id="chat-header">
            <div class="header-left">
                <span class="header-logo">💼</span>
                <h2>JobBot</h2>
                <div class="online-dot"></div>
            </div>
            <span id="thread-label"></span>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input id="user-input" type="text" placeholder="Ask me anything about jobs..." />
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let threadId = ""

        function startChat() {
            const input = document.getElementById('thread-input').value.trim()
            if (!input) return alert("Please enter your name or ID")
            threadId = input
            document.getElementById('thread-screen').style.display = 'none'
            document.getElementById('chat-screen').style.display = 'flex'
            document.getElementById('thread-label').textContent = `Session: ${threadId}`
            addMessage("Hello! I'm JobBot 👋 I can help you find jobs or answer career questions. What would you like to do?", 'bot')
        }

        function addMessage(text, sender) {
            const messages = document.getElementById('messages')
            const div = document.createElement('div')
            div.className = `message ${sender}`
            if (sender === 'bot') {
                div.innerHTML = linkify(text)
            } else {
                div.textContent = text
            }
            messages.appendChild(div)
            messages.scrollTop = messages.scrollHeight
            return div
        }

        function linkify(text) {
            return text.replace(
                /(https?:\/\/[^\s]+)/g,
                '<a href="$1" target="_blank">$1</a>'
            )
        }

        async function sendMessage() {
            const input = document.getElementById('user-input')
            const btn = document.getElementById('send-btn')
            const text = input.value.trim()
            if (!text) return

            addMessage(text, 'user')
            input.value = ''
            btn.disabled = true

            const botDiv = document.createElement('div')
            botDiv.className = 'message bot typing'
            botDiv.textContent = 'Thinking'
            document.getElementById('messages').appendChild(botDiv)
            document.getElementById('messages').scrollTop = 999999

            let fullText = ''

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thread_id: threadId, message: text })
                })

                const reader = response.body.getReader()
                const decoder = new TextDecoder()

                while (true) {
                    const { done, value } = await reader.read()
                    if (done) break

                    const lines = decoder.decode(value).split('\n')
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6))
                            if (data.text) {
                                fullText += data.text
                                botDiv.className = 'message bot'
                                botDiv.innerHTML = linkify(fullText)
                                document.getElementById('messages').scrollTop = 999999
                            }
                        }
                    }
                }
            } catch (err) {
                botDiv.className = 'message bot'
                botDiv.textContent = 'Error connecting to server.'
            }

            btn.disabled = false
            input.focus()
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('chat-screen').style.display === 'flex') {
                    sendMessage()
                } else {
                    startChat()
                }
            }
        })
    </script>
</body>
</html>
